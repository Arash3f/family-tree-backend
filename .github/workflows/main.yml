name: CI

on:
  push:
    branches: [ "main" ]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: family_tree
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d family_tree"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      neo4j:
        image: neo4j:5
        env:
          NEO4J_AUTH: neo4j/postgres
        ports:
          - 7687:7687
          - 7474:7474
        options: >-
          --health-cmd="wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"
          --health-interval=15s
          --health-timeout=10s
          --health-retries=10

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/family_tree
      REDIS_URL: redis://localhost:6379/0
      NEO4J_URI: bolt://localhost:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: postgres
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy bandit

      - name: Run lint
        run: ruff check .

      - name: Run type check
        run: mypy .

      - name: Run security scan
        run: bandit -r app -ll

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Run tests
        run: pytest -v --cov=app --cov-report=term-missing --cov-fail-under=50
